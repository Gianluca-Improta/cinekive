# Optional reverse proxy for single-port production (Phase 2+)
upstream api {
    server api:8000;
}

upstream web {
    server web:3000;
}

server {
    listen 80;
    client_max_body_size 4G;

    location /api/ {
        proxy_pass http://api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
    }

    location / {
        proxy_pass http://web/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
