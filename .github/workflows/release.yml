name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-notes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Cinekive ${{ github.ref_name }}

            **Download for your OS** (pick one installer below — not "Source code"):

            | Platform | File |
            |----------|------|
            | Windows | `Cinekive-*-win-x64.exe` or `*-portable.exe` |
            | macOS Apple Silicon | `Cinekive-*-mac-arm64.dmg` |
            | macOS Intel | `Cinekive-*-mac-x64.dmg` |
            | Linux | `Cinekive-*.AppImage` or `.deb` |

            Desktop installers attach automatically via CI (may take ~15 min after this release is created).

            **No Docker on Windows / Mac:** the app downloads a native engine pack on first start (`engine-*.zip` on this release).

            [README](https://github.com/Gianluca-Improta/cinekive#readme) · [Discussions](https://github.com/Gianluca-Improta/cinekive/discussions) · [Sponsors](https://github.com/sponsors/Gianluca-Improta)
