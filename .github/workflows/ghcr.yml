name: GHCR images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/gianluca-improta/cinekive-api
  IMAGE_WEB: ghcr.io/gianluca-improta/cinekive-web

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="latest"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "tags_latest=latest" >> "$GITHUB_OUTPUT"

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_API }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_API }}:latest

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8000
          tags: |
            ${{ env.IMAGE_WEB }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_WEB }}:latest
