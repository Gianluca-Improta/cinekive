<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'unsafe-inline'" />
    <title>Welcome to Cinekive</title>
    <style>
      :root {
        --bg: #050505;
        --panel: #0e0e0e;
        --border: #222;
        --text: #f2f2f2;
        --muted: #8a8a8a;
        --cyan: #00e5ff;
        --danger: #ff5c5c;
        --ok: #3ddc97;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: radial-gradient(1200px 600px at 50% -10%, #0a2a30 0%, var(--bg) 55%);
        color: var(--text);
        font: 14px/1.45 "Segoe UI", system-ui, sans-serif;
      }
      .wrap {
        max-width: 580px;
        margin: 0 auto;
        padding: 36px 28px 24px;
        min-height: 100%;
        display: flex;
        flex-direction: column;
      }
      .brand { font-size: 28px; font-weight: 650; margin: 0 0 6px; }
      .sub { color: var(--muted); margin: 0 0 22px; font-size: 13px; }
      .card {
        background: color-mix(in srgb, var(--panel) 92%, transparent);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px 18px;
        margin-bottom: 12px;
      }
      .card h2 { margin: 0 0 8px; font-size: 14px; font-weight: 600; }
      .card p { margin: 0; color: var(--muted); font-size: 12.5px; }
      .row { display: flex; gap: 10px; align-items: center; margin-top: 12px; }
      .path {
        flex: 1;
        min-width: 0;
        font-family: ui-monospace, Consolas, monospace;
        font-size: 11px;
        color: var(--cyan);
        background: #000;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 10px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      button {
        appearance: none;
        border: 1px solid color-mix(in srgb, var(--cyan) 45%, #333);
        background: color-mix(in srgb, var(--cyan) 12%, #111);
        color: var(--cyan);
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 12px;
        cursor: pointer;
      }
      button:hover { background: color-mix(in srgb, var(--cyan) 20%, #111); }
      button.primary {
        background: var(--cyan);
        color: #003038;
        border-color: var(--cyan);
        font-weight: 650;
        padding: 11px 16px;
        font-size: 13px;
      }
      button.primary:disabled { opacity: 0.45; cursor: not-allowed; }
      button.ghost { background: transparent; border-color: var(--border); color: var(--muted); }
      .status { display: flex; align-items: center; gap: 8px; font-size: 12px; margin-top: 10px; }
      .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
      .dot.ok { background: var(--ok); }
      .dot.bad { background: var(--danger); }
      .dot.wait { background: #f5c542; }
      .foot {
        margin-top: auto;
        padding-top: 16px;
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        align-items: center;
      }
      .err { color: var(--danger); font-size: 12px; margin-top: 10px; white-space: pre-wrap; }
      .hint { font-size: 11px; color: var(--muted); margin-top: 8px; }
      label.engine { display: block; margin-top: 10px; font-size: 12px; cursor: pointer; }
      label.engine input { margin-right: 8px; accent-color: var(--cyan); }
      .progress { margin-top: 10px; height: 4px; background: #1a1a1a; border-radius: 2px; overflow: hidden; display: none; }
      .progress i { display: block; height: 100%; width: 0%; background: var(--cyan); transition: width 0.2s; }
      .health-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; margin-top: 10px; font-size: 11px; }
      .health-grid span:last-child { color: var(--muted); text-align: right; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1 class="brand">Cinekive</h1>
      <p class="sub">Local cinematic archive. One-time setup — Docker optional on Windows and Mac.</p>

      <div class="card">
        <h2>1. Engine</h2>
        <p>How Cinekive runs search and ingest on your machine.</p>
        <label class="engine"><input type="radio" name="engine" value="auto" checked /> Auto (recommended — Docker if available, else native on Windows / Mac)</label>
        <label class="engine"><input type="radio" name="engine" value="docker" /> Docker Desktop (fast if already installed)</label>
        <label class="engine" id="nativeOpt"><input type="radio" name="engine" value="native" /> Native engine — no Docker (Windows / Mac, ~2 GB one-time download)</label>
        <div class="status">
          <span class="dot wait" id="engineDot"></span>
          <span id="engineLabel">Checking…</span>
        </div>
        <div class="progress" id="dlProgress"><i id="dlBar"></i></div>
        <p class="hint" id="engineHint"></p>
      </div>

      <div class="card">
        <h2>2. Visual archive folder</h2>
        <p>Where stills and film folders live. Use a fast drive with free space.</p>
        <div class="row">
          <div class="path" id="libPath">—</div>
          <button type="button" id="btnPick">Choose…</button>
        </div>
      </div>

      <div class="card">
        <h2>3. Health</h2>
        <div class="health-grid" id="healthGrid"></div>
        <p class="err" id="err" hidden></p>
      </div>

      <div class="foot">
        <button type="button" class="ghost" id="btnLogs">Open logs</button>
        <button type="button" class="ghost" id="btnQuit">Quit</button>
        <button type="button" class="primary" id="btnStart" disabled>Start Cinekive</button>
      </div>
    </div>
    <script>
      const engineDot = document.getElementById("engineDot");
      const engineLabel = document.getElementById("engineLabel");
      const engineHint = document.getElementById("engineHint");
      const libPath = document.getElementById("libPath");
      const btnStart = document.getElementById("btnStart");
      const err = document.getElementById("err");
      const healthGrid = document.getElementById("healthGrid");
      const dlProgress = document.getElementById("dlProgress");
      const dlBar = document.getElementById("dlBar");
      let libraryPath = "";
      let health = null;

      function selectedEngine() {
        return document.querySelector('input[name="engine"]:checked')?.value || "auto";
      }

      function canStart() {
        if (!libraryPath) return false;
        const mode = selectedEngine();
        if (mode === "docker" && health && !health.docker?.ok) return false;
        return true;
      }

      function syncStart() {
        btnStart.disabled = !canStart();
      }

      function fmtHealth(h) {
        healthGrid.innerHTML = [
          ["Platform", `${h.platform} ${h.arch}`],
          ["Docker", h.docker?.ok ? "Ready" : h.docker?.reason || "No"],
          ["Native pack", h.nativeReady ? `Installed (${h.packVersion || "?"})` : h.packSupported ? "Will download" : "N/A"],
          ["Free disk", h.diskFreeGb != null ? `${h.diskFreeGb} GB` : "—"],
        ].map(([k, v]) => `<span>${k}</span><span>${v}</span>`).join("");
      }

      async function refreshHealth() {
        health = await window.cinekive.getHealthStatus();
        fmtHealth(health);
        const mode = selectedEngine();
        if (mode === "docker") {
          engineDot.className = "dot " + (health.docker?.ok ? "ok" : "bad");
          engineLabel.textContent = health.docker?.ok ? "Docker ready" : "Docker not available";
          engineHint.textContent = health.docker?.ok
            ? "Will pull pre-built images when possible."
            : "Install Docker or switch to Auto / Native.";
        } else if (mode === "native") {
          engineDot.className = "dot " + (health.nativeReady ? "ok" : "wait");
          engineLabel.textContent = health.nativeReady ? "Native engine installed" : "Native engine will download on start";
          engineHint.textContent = "No Docker required. First download is large (~2 GB).";
        } else {
          const useNative = !health.docker?.ok && health.packSupported;
          engineDot.className = "dot " + (health.docker?.ok || useNative ? "ok" : "bad");
          engineLabel.textContent = health.docker?.ok
            ? "Will use Docker"
            : useNative
              ? "Will use native engine (no Docker)"
              : "Need Docker on this platform";
          engineHint.textContent = health.docker?.ok
            ? "Docker detected — fastest path."
            : useNative
              ? "Docker not found — Cinekive downloads its own engine."
              : "Install Docker Desktop.";
        }
        syncStart();
      }

      document.querySelectorAll('input[name="engine"]').forEach((el) => {
        el.addEventListener("change", refreshHealth);
      });

      window.cinekive.onDownloadProgress?.((done, total) => {
        if (!total) return;
        dlProgress.style.display = "block";
        dlBar.style.width = `${Math.round((done / total) * 100)}%`;
        engineLabel.textContent = `Downloading engine… ${Math.round((done / total) * 100)}%`;
      });

      async function init() {
        const info = await window.cinekive.getSetupInfo();
        libraryPath = info.libraryPath || info.defaultLibraryPath;
        libPath.textContent = libraryPath;
        if (!info.packSupported) {
          document.getElementById("nativeOpt").style.opacity = "0.45";
        }
        await refreshHealth();
        syncStart();
      }

      document.getElementById("btnPick").onclick = async () => {
        const p = await window.cinekive.pickLibraryFolder();
        if (p) {
          libraryPath = p;
          libPath.textContent = p;
          syncStart();
        }
      };
      document.getElementById("btnQuit").onclick = () => window.cinekive.quit();
      document.getElementById("btnLogs").onclick = () => window.cinekive.openEngineLogs();
      document.getElementById("btnStart").onclick = async () => {
        btnStart.disabled = true;
        btnStart.textContent = "Starting…";
        err.hidden = true;
        try {
          await window.cinekive.completeFirstRun({
            libraryPath,
            engineMode: selectedEngine(),
          });
        } catch (e) {
          err.hidden = false;
          err.textContent = String(e?.message || e);
          btnStart.disabled = false;
          btnStart.textContent = "Start Cinekive";
          dlProgress.style.display = "none";
        }
      };

      init();
    </script>
  </body>
</html>
